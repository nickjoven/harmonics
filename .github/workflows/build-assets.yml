name: Build Visual Assets

on:
  push:
    branches: [main]
    paths:
      - "animate_*.py"
      - "sync_cost/derivations/**/*.py"
      - "stribeck_lattice.py"
      - "Makefile"
  pull_request:
    paths:
      - "animate_*.py"
      - "sync_cost/derivations/**/*.py"
      - "stribeck_lattice.py"
      - "Makefile"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy matplotlib

      - name: Build GIFs
        run: make gifs

      - name: Build derivation figures
        run: make figures

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: visual-assets
          path: |
            *.gif
            sync_cost/derivations/*.png
          retention-days: 30
