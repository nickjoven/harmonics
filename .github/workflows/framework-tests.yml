name: Framework consistency tests

on:
  push:
    branches: [main]
    paths:
      - "sync_cost/derivations/**.py"
      - ".github/workflows/framework-tests.yml"
  pull_request:
    paths:
      - "sync_cost/derivations/**.py"
      - ".github/workflows/framework-tests.yml"
  workflow_dispatch:

concurrency:
  group: framework-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Guards against numerical drift across framework_constants.py and
  # the derivations it centralizes. Required status check for branch
  # protection should be set to this job's name: "consistency".
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run framework consistency tests
        run: |
          python3 sync_cost/derivations/test_framework_constants.py
