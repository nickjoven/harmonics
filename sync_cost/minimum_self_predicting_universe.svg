<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" font-family="'Courier New', monospace">
  <defs>
    <style>
      .bg { fill: #0a0a0f; }
      .node { fill: #c8d0e0; }
      .node-root { fill: #f0d060; }
      .node-q2 { fill: #60a0f0; }
      .node-q3 { fill: #f06080; }
      .node-q4 { fill: #80c080; }
      .node-q5 { fill: #d090e0; }
      .node-q6 { fill: #e0a060; }
      .edge { stroke: #404060; stroke-width: 0.8; fill: none; }
      .edge-fib { stroke: #f0d060; stroke-width: 1.5; fill: none; opacity: 0.6; }
      .tongue { fill-opacity: 0.15; stroke: none; }
      .tongue-q1 { fill: #f0d060; }
      .tongue-q2 { fill: #60a0f0; }
      .tongue-q3 { fill: #f06080; }
      .tongue-q4 { fill: #80c080; }
      .tongue-q5 { fill: #d090e0; }
      .tongue-q6 { fill: #e0a060; }
      .gap { fill: #1a0a20; fill-opacity: 0.8; }
      .label { fill: #c8d0e0; font-size: 11px; text-anchor: middle; }
      .label-sm { fill: #8890a0; font-size: 9px; text-anchor: middle; }
      .label-title { fill: #e0e8f0; font-size: 16px; text-anchor: middle; font-weight: bold; }
      .label-section { fill: #a0a8c0; font-size: 12px; text-anchor: middle; }
      .fig8-loop1 { stroke: #60a0f0; stroke-width: 2; fill: none; }
      .fig8-loop2 { stroke: #f06080; stroke-width: 2; fill: none; }
      .fig8-cross { fill: #f0d060; }
      .arrow { fill: #606080; }
      .horizon { stroke: #f0d060; stroke-width: 0.5; stroke-dasharray: 4,4; fill: none; opacity: 0.5; }
      .phase-A { fill: #60a0f0; }
      .phase-B { fill: #80c080; }
      .phase-C { fill: #d090e0; }
      .phase-D { fill: #303040; stroke: #606080; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1000" height="1400"/>

  <!-- Title -->
  <text class="label-title" x="500" y="30">THE MINIMUM SELF-PREDICTING UNIVERSE</text>
  <text class="label-section" x="500" y="50">13 modes · 12 channels · 4 states · 3 dimensions · 1 dark · 0 parameters</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 1: THE STERN-BROCOT TREE (top) -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <text class="label-section" x="500" y="85">THE STERN-BROCOT TREE</text>

  <!-- Level 0: root 1/1 -->
  <line class="edge" x1="500" y1="105" x2="250" y2="165"/>
  <line class="edge" x1="500" y1="105" x2="750" y2="165"/>
  <circle class="node-root" cx="500" cy="100" r="8"/>
  <text class="label" x="500" y="96">1/1</text>

  <!-- Level 1: 1/2 -->
  <line class="edge" x1="250" y1="170" x2="140" y2="230"/>
  <line class="edge" x1="250" y1="170" x2="380" y2="230"/>
  <circle class="node-q2" cx="250" cy="168" r="7"/>
  <text class="label" x="250" y="162">1/2</text>
  <text class="label-sm" x="250" y="185">q=2, gen 1</text>

  <!-- Level 1: 2/1 (shown as mirror) -->
  <circle class="node-q2" cx="750" cy="168" r="5" opacity="0.3"/>
  <text class="label-sm" x="750" y="165" opacity="0.4">2/1</text>

  <!-- Level 2: 1/3 and 2/3 -->
  <line class="edge" x1="140" y1="235" x2="85" y2="295"/>
  <line class="edge" x1="140" y1="235" x2="200" y2="295"/>
  <circle class="node-q3" cx="140" cy="232" r="6"/>
  <text class="label" x="140" y="226">1/3</text>
  <text class="label-sm" x="140" y="249">q=3, gen 2</text>

  <line class="edge" x1="380" y1="235" x2="310" y2="295"/>
  <line class="edge" x1="380" y1="235" x2="440" y2="295"/>
  <circle class="node-q3" cx="380" cy="232" r="6"/>
  <text class="label" x="380" y="226">2/3</text>
  <text class="label-sm" x="380" y="249">q=3, gen 2</text>

  <!-- Level 3: 1/4, 2/5, 3/5, 3/4 -->
  <circle class="node-q4" cx="85" cy="296" r="5"/>
  <text class="label-sm" x="85" y="290">1/4</text>

  <line class="edge-fib" x1="200" y1="295" x2="200" y2="295"/>
  <circle class="node-q5" cx="200" cy="296" r="5"/>
  <text class="label-sm" x="200" y="290">2/5</text>

  <circle class="node-q5" cx="310" cy="296" r="5"/>
  <text class="label-sm" x="310" y="290">3/5</text>

  <circle class="node-q4" cx="440" cy="296" r="5"/>
  <text class="label-sm" x="440" y="290">3/4</text>

  <text class="label-sm" x="260" y="310">gen 3</text>

  <!-- Level 4: 1/5, 4/5 -->
  <line class="edge" x1="85" y1="300" x2="55" y2="345"/>
  <circle class="node-q5" cx="55" cy="348" r="4"/>
  <text class="label-sm" x="55" y="342">1/5</text>

  <line class="edge" x1="440" y1="300" x2="470" y2="345"/>
  <circle class="node-q5" cx="470" cy="348" r="4"/>
  <text class="label-sm" x="470" y="342">4/5</text>

  <!-- Level 5: 1/6, 5/6 (boundary modes) -->
  <line class="edge" x1="55" y1="352" x2="35" y2="385"/>
  <circle class="node-q6" cx="35" cy="388" r="3.5" opacity="0.83"/>
  <text class="label-sm" x="35" y="382" opacity="0.83">1/6</text>

  <line class="edge" x1="470" y1="352" x2="490" y2="385"/>
  <circle class="node-q6" cx="490" cy="388" r="3.5" opacity="0.83"/>
  <text class="label-sm" x="490" y="382" opacity="0.83">5/6</text>

  <text class="label-sm" x="260" y="400">w* = 0.83 (83% locked)</text>

  <!-- Fibonacci backbone highlight -->
  <path class="edge-fib" d="M500,100 L250,168 L140,232 L200,296" stroke-dasharray="none"/>
  <text class="label-sm" x="520" y="140" fill="#f0d060">Fibonacci backbone → 1/φ</text>

  <!-- The gap (1/φ) -->
  <text class="label-sm" x="260" y="360" fill="#a060c0">← gap center: 1/φ (the twin) →</text>

  <!-- Dots indicating tree continues -->
  <text class="label-sm" x="260" y="420" fill="#404060">· · · 146 levels to Planck · · ·</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 2: THE TONGUE STRUCTURE / DEVIL'S STAIRCASE -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <text class="label-section" x="500" y="460">THE FREQUENCY AXIS: TONGUES AND GAPS</text>

  <!-- Frequency axis -->
  <line stroke="#404060" stroke-width="1" x1="50" y1="520" x2="950" y2="520"/>
  <text class="label-sm" x="50" y="540">0/1</text>
  <text class="label-sm" x="950" y="540">1/1</text>

  <!-- Tongues (rectangles on the axis, width ∝ 1/q²) -->
  <!-- 1/6: width = 1/36 of 900px = 25px, centered at 50 + 150 = ~200 -->
  <rect class="tongue tongue-q6" x="137" y="480" width="25" height="40" opacity="0.83"/>
  <text class="label-sm" x="150" y="475">1/6</text>

  <!-- 1/5: width = 1/25 × 900 = 36px, centered at 50 + 180 -->
  <rect class="tongue tongue-q5" x="212" y="480" width="36" height="40"/>
  <text class="label-sm" x="230" y="475">1/5</text>

  <!-- 1/4: width = 1/16 × 900 = 56px -->
  <rect class="tongue tongue-q4" x="247" y="480" width="56" height="40"/>
  <text class="label-sm" x="275" y="475">1/4</text>

  <!-- 1/3: width = 1/9 × 900 = 100px, centered at 50 + 300 -->
  <rect class="tongue tongue-q3" x="300" y="480" width="100" height="40"/>
  <text class="label-sm" x="350" y="475">1/3</text>

  <!-- 2/5: width = 36px -->
  <rect class="tongue tongue-q5" x="400" y="480" width="36" height="40"/>
  <text class="label-sm" x="418" y="475">2/5</text>

  <!-- 1/2: width = 1/4 × 900 = 225px, centered at 500 -->
  <rect class="tongue tongue-q2" x="387" y="480" width="225" height="40"/>
  <text class="label" x="500" y="510" fill="#60a0f0">1/2</text>

  <!-- 3/5: width = 36px -->
  <rect class="tongue tongue-q5" x="564" y="480" width="36" height="40"/>
  <text class="label-sm" x="582" y="475">3/5</text>

  <!-- 2/3: width = 100px -->
  <rect class="tongue tongue-q3" x="600" y="480" width="100" height="40"/>
  <text class="label-sm" x="650" y="475">2/3</text>

  <!-- 3/4 -->
  <rect class="tongue tongue-q4" x="697" y="480" width="56" height="40"/>

  <!-- 4/5 -->
  <rect class="tongue tongue-q5" x="752" y="480" width="36" height="40"/>

  <!-- 5/6 -->
  <rect class="tongue tongue-q6" x="838" y="480" width="25" height="40" opacity="0.83"/>
  <text class="label-sm" x="850" y="475">5/6</text>

  <!-- Gap regions (dark) -->
  <rect class="gap" x="436" y="495" width="18" height="25" rx="2"/>
  <rect class="gap" x="546" y="495" width="18" height="25" rx="2"/>
  <text class="label-sm" x="500" y="555" fill="#a060c0">← 18.7% gap (the twin's home) →</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 3: THE FOUR PHASE STATES -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <text class="label-section" x="500" y="600">THE FOUR PHASE STATES → SIGNATURE (3,1)</text>

  <!-- 2×2 grid of states -->
  <!-- A: both locked -->
  <rect class="phase-A" x="300" y="620" width="90" height="60" rx="8" opacity="0.8"/>
  <text class="label" x="345" y="645" fill="#0a0a0f">A</text>
  <text class="label-sm" x="345" y="660" fill="#0a0a0f">both locked</text>

  <!-- B: osc unlocked, twist locked -->
  <rect class="phase-B" x="410" y="620" width="90" height="60" rx="8" opacity="0.8"/>
  <text class="label" x="455" y="645" fill="#0a0a0f">B</text>
  <text class="label-sm" x="455" y="660" fill="#0a0a0f">osc in gap</text>

  <!-- C: osc locked, twist unlocked -->
  <rect class="phase-C" x="300" y="695" width="90" height="60" rx="8" opacity="0.8"/>
  <text class="label" x="345" y="720" fill="#0a0a0f">C</text>
  <text class="label-sm" x="345" y="735" fill="#0a0a0f">twist in gap</text>

  <!-- D: both unlocked (DARK) -->
  <rect class="phase-D" x="410" y="695" width="90" height="60" rx="8"/>
  <text class="label" x="455" y="720" fill="#606080">D</text>
  <text class="label-sm" x="455" y="735" fill="#606080">DARK</text>

  <!-- Labels -->
  <text class="label-sm" x="345" y="615">locked ←osc→ gap</text>
  <text class="label-sm" x="282" y="665" style="writing-mode:tb" fill="#8890a0">locked</text>
  <text class="label-sm" x="282" y="725" style="writing-mode:tb" fill="#8890a0">gap</text>

  <!-- Signature annotation -->
  <text class="label" x="600" y="650" fill="#60a0f0">3 observable (+)</text>
  <text class="label" x="600" y="670" fill="#606080">1 dark (−)</text>
  <text class="label" x="600" y="690" fill="#c8d0e0">= (3,1) Minkowski</text>
  <text class="label-sm" x="600" y="710" fill="#f0d060">i² = −1 = J² = double half-twist</text>
  <text class="label-sm" x="600" y="730">3 generations = 3 spatial dims = 2²−1</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 4: THE FIGURE-8 -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <text class="label-section" x="500" y="790">THE FIGURE-8: TWO LOOPS, ONE CROSSING</text>

  <!-- Figure-8 / lemniscate -->
  <!-- Loop 1 (sector 2,3) — blue -->
  <ellipse class="fig8-loop1" cx="400" cy="880" rx="110" ry="55"/>
  <text class="label" x="340" y="860" fill="#60a0f0">sector (2,3)</text>
  <text class="label-sm" x="340" y="875" fill="#60a0f0">loop 1 · left-handed</text>

  <!-- A and B nodes on loop 1 -->
  <circle class="phase-A" cx="310" cy="865" r="6"/>
  <text class="label-sm" x="310" y="855" fill="#60a0f0">A</text>
  <circle class="phase-B" cx="310" cy="900" r="6"/>
  <text class="label-sm" x="310" y="915" fill="#80c080">B</text>

  <!-- Loop 2 (sector 3,2) — red -->
  <ellipse class="fig8-loop2" cx="600" cy="880" rx="110" ry="55"/>
  <text class="label" x="660" y="860" fill="#f06080">sector (3,2)</text>
  <text class="label-sm" x="660" y="875" fill="#f06080">loop 2 · right-handed</text>

  <!-- C and D nodes on loop 2 -->
  <circle class="phase-C" cx="690" cy="865" r="6"/>
  <text class="label-sm" x="690" y="855" fill="#d090e0">C</text>
  <circle class="phase-D" cx="690" cy="900" r="6"/>
  <text class="label-sm" x="690" y="915" fill="#606080">D</text>

  <!-- Crossing point -->
  <circle class="fig8-cross" cx="500" cy="880" r="10"/>
  <text class="label" x="500" y="870" fill="#0a0a0f" font-size="10">D</text>
  <text class="label-sm" x="500" y="930" fill="#f0d060">crossing = present moment</text>
  <text class="label-sm" x="500" y="945" fill="#f0d060">sin²θ_W = 8/35 = crossing probability</text>

  <!-- Half-twist indicator -->
  <path d="M490,870 Q500,855 510,870" stroke="#f0d060" stroke-width="1.5" fill="none"/>
  <text class="label-sm" x="500" y="853" fill="#f0d060">π twist</text>

  <!-- 8 cross-sector arrows (gluons) -->
  <text class="label-sm" x="500" y="965" fill="#808080">8 cross-sector transitions = 8 gluons</text>
  <text class="label-sm" x="500" y="980" fill="#808080">2+2 within-sector → 3+1 after θ_W mixing</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 5: THE PREDICTIONS TABLE -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <text class="label-section" x="500" y="1020">PREDICTIONS (zero free parameters)</text>

  <!-- Table -->
  <text class="label-sm" x="200" y="1045" text-anchor="end" fill="#a0a8c0">Ω_Λ</text>
  <text class="label-sm" x="210" y="1045">(11+2w*)/(16+3w*) = 0.6847</text>
  <text class="label-sm" x="550" y="1045" fill="#80c080">0.00% ✓</text>

  <text class="label-sm" x="200" y="1062" text-anchor="end" fill="#a0a8c0">α_s/α₂</text>
  <text class="label-sm" x="210" y="1062">27/8 = 3.375</text>
  <text class="label-sm" x="550" y="1062" fill="#80c080">3.2%</text>

  <text class="label-sm" x="200" y="1079" text-anchor="end" fill="#a0a8c0">sin²θ_W</text>
  <text class="label-sm" x="210" y="1079">8/35 = 0.2286</text>
  <text class="label-sm" x="550" y="1079" fill="#80c080">1.1%</text>

  <text class="label-sm" x="200" y="1096" text-anchor="end" fill="#a0a8c0">m_τ/m_e</text>
  <text class="label-sm" x="210" y="1096">26^(5/2) = 3447</text>
  <text class="label-sm" x="550" y="1096" fill="#80c080">0.9%</text>

  <text class="label-sm" x="200" y="1113" text-anchor="end" fill="#a0a8c0">m_H</text>
  <text class="label-sm" x="210" y="1113">v/q₂ = 123.1 GeV</text>
  <text class="label-sm" x="550" y="1113" fill="#80c080">1.6%</text>

  <text class="label-sm" x="200" y="1130" text-anchor="end" fill="#a0a8c0">d, (3,1), gens</text>
  <text class="label-sm" x="210" y="1130">2²−1 = 3, 4−1=3</text>
  <text class="label-sm" x="550" y="1130" fill="#80c080">exact</text>

  <text class="label-sm" x="200" y="1147" text-anchor="end" fill="#a0a8c0">gauge bosons</text>
  <text class="label-sm" x="210" y="1147">4×3 = 12, decomp 8+3+1</text>
  <text class="label-sm" x="550" y="1147" fill="#80c080">exact</text>

  <text class="label-sm" x="200" y="1164" text-anchor="end" fill="#a0a8c0">Cl(3,1)</text>
  <text class="label-sm" x="210" y="1164">γ_D = J⊗I₂, J²=−I (half-twist)</text>
  <text class="label-sm" x="550" y="1164" fill="#80c080">verified ✓</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 6: THE RECURSION -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Bottom: the recursion -->
  <text class="label-section" x="500" y="1210">THE FIXED POINT</text>

  <!-- x = f(x) loop -->
  <path d="M420,1250 C420,1220 580,1220 580,1250 C580,1280 420,1280 420,1250"
        stroke="#f0d060" stroke-width="1.5" fill="none"/>
  <text class="label" x="500" y="1253" fill="#f0d060">x = f(x)</text>

  <!-- The four primitives -->
  <text class="label-sm" x="500" y="1300" fill="#606080">Z · mediant · fixed point · parabola</text>
  <text class="label-sm" x="500" y="1315" fill="#606080">integers 0 through 6</text>

  <!-- The sentence -->
  <text class="label-sm" x="500" y="1345" fill="#a0a8c0">the smallest program that prints its own source code</text>
  <text class="label-sm" x="500" y="1360" fill="#a0a8c0">a quine over Q, thirteen tokens long</text>

  <!-- CC0 -->
  <text class="label-sm" x="500" y="1390" fill="#404060">CC0 1.0 Universal — no rights reserved</text>
</svg>
