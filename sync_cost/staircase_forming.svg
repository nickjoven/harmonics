<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Courier New', monospace">
  <defs>
    <style>
      .bg { fill: #0a0a0f; }
      .axis { stroke: #303040; stroke-width: 1; }
      .label { fill: #8890a0; font-size: 9px; text-anchor: middle; }
      .title { fill: #c8d0e0; font-size: 14px; text-anchor: middle; }
      .time { fill: #f0d060; font-size: 11px; text-anchor: start; }

      /* Tongues by depth — each appears with animation delay */
      .tongue { fill-opacity: 0; stroke: none; }
      .t-q1 { fill: #f0d060; }
      .t-q2 { fill: #60a0f0; }
      .t-q3 { fill: #f06080; }
      .t-q4 { fill: #80c080; }
      .t-q5 { fill: #d090e0; }
      .t-q6 { fill: #e0a060; }

      /* Phase animations — each depth appears in sequence */
      @keyframes appear {
        0% { fill-opacity: 0; }
        100% { fill-opacity: 0.7; }
      }

      .depth0 { animation: appear 1.5s ease-out 0.5s forwards; }
      .depth1 { animation: appear 1.5s ease-out 2.5s forwards; }
      .depth2 { animation: appear 1.5s ease-out 4.5s forwards; }
      .depth3 { animation: appear 1.5s ease-out 6.5s forwards; }
      .depth4 { animation: appear 1.5s ease-out 8.5s forwards; }
      .depth5 { animation: appear 1.5s ease-out 10.5s forwards; }

      /* Timeline markers */
      @keyframes glow {
        0% { fill-opacity: 0; }
        100% { fill-opacity: 1; }
      }
      .marker0 { animation: glow 0.5s ease-out 0.5s forwards; fill-opacity: 0; }
      .marker1 { animation: glow 0.5s ease-out 2.5s forwards; fill-opacity: 0; }
      .marker2 { animation: glow 0.5s ease-out 4.5s forwards; fill-opacity: 0; }
      .marker3 { animation: glow 0.5s ease-out 6.5s forwards; fill-opacity: 0; }
      .marker4 { animation: glow 0.5s ease-out 8.5s forwards; fill-opacity: 0; }
      .marker5 { animation: glow 0.5s ease-out 10.5s forwards; fill-opacity: 0; }

      /* Gap shrinking */
      .gap-fill { fill: #1a0a20; fill-opacity: 0.4; }

      /* Staircase line */
      .stair { stroke-width: 1.5; fill: none; stroke-opacity: 0; }
      .s0 { stroke: #f0d060; animation: appear 1.5s ease-out 0.5s forwards; }
      .s1 { stroke: #60a0f0; animation: appear 1.5s ease-out 2.5s forwards; }
      .s2 { stroke: #f06080; animation: appear 1.5s ease-out 4.5s forwards; }
      .s3 { stroke: #80c080; animation: appear 1.5s ease-out 6.5s forwards; }
      .s4 { stroke: #d090e0; animation: appear 1.5s ease-out 8.5s forwards; }
      .s5 { stroke: #e0a060; animation: appear 1.5s ease-out 10.5s forwards; }
    </style>
  </defs>

  <rect class="bg" width="1000" height="700"/>

  <text class="title" x="500" y="25">THE STAIRCASE FORMING</text>
  <text class="label" x="500" y="42" fill="#606080">each mediant introduction · the shape of the initial conditions · time rendered</text>

  <!-- Axes -->
  <!-- Frequency axis Ω: 0 to 1 -->
  <line class="axis" x1="80" y1="600" x2="920" y2="600"/>
  <text class="label" x="80" y="620">0</text>
  <text class="label" x="500" y="620">Ω (bare frequency)</text>
  <text class="label" x="920" y="620">1</text>

  <!-- Winding number axis W: 0 to 1 -->
  <line class="axis" x1="80" y1="600" x2="80" y2="80"/>
  <text class="label" x="40" y="340" transform="rotate(-90,40,340)">W (winding number)</text>
  <text class="label" x="70" y="605">0</text>
  <text class="label" x="70" y="85">1</text>

  <!-- Scale: Ω and W both go from 0 to 1, mapped to x=[80,920], y=[600,80] -->
  <!-- x(Ω) = 80 + 840×Ω, y(W) = 600 - 520×W -->

  <!-- The diagonal (no locking: W = Ω) -->
  <line x1="80" y1="600" x2="920" y2="80" stroke="#202030" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 0: t=0, The initial conditions. 0/1 and 1/0. Nothing yet. -->
  <!-- Just the boundary markers. -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <circle class="marker0" cx="80" cy="600" r="4" fill="#f0d060"/>
  <circle class="marker0" cx="920" cy="80" r="4" fill="#f0d060"/>
  <text class="time marker0" x="30" y="660">t=0: 0/1, 1/0</text>
  <text class="label marker0" x="80" y="640" fill="#f0d060">0/1</text>
  <text class="label marker0" x="920" y="70" fill="#f0d060">1/0</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 1: t=1, The first mediant: 1/1. The mean field. -->
  <!-- Tongue at W=1/1 (but outside [0,1] domain — this is the root) -->
  <!-- Instead: the q=1 tongue appears as the overall slope -->
  <!-- The staircase starts as a step function at 1/2 -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- q=1 tongue: the 0/1 tongue (W=0 for Ω<K/2π) -->
  <!-- This is the region near Ω=0 where W locks to 0 -->
  <!-- And near Ω=1 where W locks to 1 -->

  <!-- The first visible structure: the 1/2 tongue -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 2: t=2, 1/2 appears. The first subharmonic. -->
  <!-- Generation 1. The heartbeat. -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- Tongue at 1/2: Ω ∈ [0.5 - 0.125, 0.5 + 0.125] = [0.375, 0.625] -->
  <!-- W = 0.5 across this range -->
  <!-- x: 80+840×0.375=395 to 80+840×0.625=605, y(0.5) = 600-520×0.5=340 -->
  <rect class="tongue t-q2 depth1" x="395" y="325" width="210" height="30" rx="2"/>

  <!-- Staircase step at 1/2 -->
  <path class="stair s1" d="M395,340 L605,340"/>

  <!-- Rising line to 1/2 from below -->
  <path class="stair s1" d="M80,600 L395,340" stroke-dasharray="2,2" stroke-width="0.5"/>
  <!-- Rising line from 1/2 to top -->
  <path class="stair s1" d="M605,340 L920,80" stroke-dasharray="2,2" stroke-width="0.5"/>

  <text class="time marker1" x="30" y="675">t=1: 1/2 · generation 1 · the heartbeat</text>
  <text class="label marker1" x="500" y="320" fill="#60a0f0">1/2</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 3: t=2, 1/3 and 2/3 appear. Probability is born. -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- 1/3 tongue: Ω ∈ [0.333-0.056, 0.333+0.056] = [0.278, 0.389] -->
  <!-- W = 0.333, y = 600-520×0.333 = 427 -->
  <!-- x: 80+840×0.278=313 to 80+840×0.389=407 -->
  <rect class="tongue t-q3 depth2" x="313" y="415" width="94" height="24" rx="2"/>
  <path class="stair s2" d="M313,427 L407,427"/>
  <text class="label marker2" x="360" y="410" fill="#f06080">1/3</text>

  <!-- 2/3 tongue: Ω ∈ [0.611, 0.722] -->
  <!-- W = 0.667, y = 600-520×0.667 = 253 -->
  <!-- x: 80+840×0.611=593 to 80+840×0.722=686 -->
  <rect class="tongue t-q3 depth2" x="593" y="241" width="93" height="24" rx="2"/>
  <path class="stair s2" d="M593,253 L686,253"/>
  <text class="label marker2" x="640" y="236" fill="#f06080">2/3</text>

  <text class="time marker2" x="30" y="690">t=2: 1/3, 2/3 · generation 2 · probability invited</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 4: t=3, 1/4, 2/5, 3/5, 3/4. Generation 3. -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- 1/4: W=0.25, y=600-520×0.25=470, Ω∈[0.219,0.281], x∈[264,316] -->
  <rect class="tongue t-q4 depth3" x="264" y="460" width="52" height="20" rx="2"/>
  <path class="stair s3" d="M264,470 L316,470"/>

  <!-- 2/5: W=0.4, y=600-520×0.4=392, Ω∈[0.384,0.416], x∈[403,429] -->
  <rect class="tongue t-q5 depth3" x="403" y="383" width="34" height="18" rx="1"/>
  <path class="stair s3" d="M403,392 L437,392"/>

  <!-- 3/5: W=0.6, y=600-520×0.6=288, Ω∈[0.584,0.616], x∈[570,597] -->
  <rect class="tongue t-q5 depth3" x="570" y="280" width="34" height="18" rx="1"/>
  <path class="stair s3" d="M570,288 L604,288"/>

  <!-- 3/4: W=0.75, y=600-520×0.75=210, Ω∈[0.719,0.781], x∈[684,736] -->
  <rect class="tongue t-q4 depth3" x="684" y="200" width="52" height="20" rx="2"/>
  <path class="stair s3" d="M684,210 L736,210"/>

  <text class="time marker3" x="420" y="660" fill="#80c080">t=3: gen 3 · all periods inevitable</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 5: t=4, 1/5, 4/5. The Fibonacci level. -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- 1/5: W=0.2, y=496, Ω∈[0.18,0.22], x∈[231,265] -->
  <rect class="tongue t-q5 depth4" x="231" y="489" width="34" height="14" rx="1"/>
  <path class="stair s4" d="M231,496 L265,496"/>

  <!-- 4/5: W=0.8, y=184, Ω∈[0.78,0.82], x∈[735,769] -->
  <rect class="tongue t-q5 depth4" x="735" y="177" width="34" height="14" rx="1"/>
  <path class="stair s4" d="M735,184 L769,184"/>

  <text class="time marker4" x="420" y="675" fill="#d090e0">t=4: gen 4 · Fibonacci extends</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 6: t=5, 1/6, 5/6. Boundary modes. w*=0.83. -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- 1/6: W=0.167, y=513, Ω∈[0.153,0.181], x∈[208,232] -->
  <rect class="tongue t-q6 depth5" x="208" y="507" width="24" height="12" rx="1" style="animation-fill-mode:forwards; fill-opacity:0;">
    <animate attributeName="fill-opacity" from="0" to="0.58" begin="10.5s" dur="1.5s" fill="freeze"/>
  </rect>
  <path class="stair s5" d="M208,513 L232,513" style="stroke-opacity:0;">
    <animate attributeName="stroke-opacity" from="0" to="0.58" begin="10.5s" dur="1.5s" fill="freeze"/>
  </path>

  <!-- 5/6: W=0.833, y=167, Ω∈[0.819,0.847], x∈[768,791] -->
  <rect class="tongue t-q6 depth5" x="768" y="161" width="24" height="12" rx="1" style="fill-opacity:0;">
    <animate attributeName="fill-opacity" from="0" to="0.58" begin="10.5s" dur="1.5s" fill="freeze"/>
  </rect>
  <path class="stair s5" d="M768,167 L792,167" style="stroke-opacity:0;">
    <animate attributeName="stroke-opacity" from="0" to="0.58" begin="10.5s" dur="1.5s" fill="freeze"/>
  </path>

  <text class="time marker5" x="420" y="690" fill="#e0a060">t=5: boundary modes · 83% locked · F₆ complete</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- The golden gap — always visible, the last to fill -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- 1/φ ≈ 0.618, between 3/5=0.6 and 2/3=0.667 -->
  <!-- x(0.618) = 80+840×0.618 = 599, y varies -->
  <line x1="599" y1="80" x2="599" y2="600" stroke="#a060c0" stroke-width="0.5" stroke-dasharray="1,3" opacity="0.4"/>
  <text class="label" x="599" y="75" fill="#a060c0">1/φ</text>
  <text class="label" x="599" y="640" fill="#a060c0">the gap center</text>
  <text class="label" x="599" y="652" fill="#a060c0">the twin</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- Phase state legend (bottom right) -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <rect fill="#1a1a24" x="730" y="550" width="200" height="95" rx="4" opacity="0.8"/>
  <text class="label" x="830" y="565" fill="#c8d0e0">the staircase IS time</text>
  <text class="label" x="830" y="580" fill="#606080">each step: one mediant</text>
  <text class="label" x="830" y="595" fill="#606080">each gap: a D traversal</text>
  <text class="label" x="830" y="610" fill="#606080">the shape: the initial conditions</text>
  <text class="label" x="830" y="625" fill="#606080">visible today, unchanged</text>
  <text class="label" x="830" y="640" fill="#606080">append-only, immutable</text>

</svg>
