<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Stern-Brocot walk to 7/60 = [0; 8, 1, 1, 3]. Depth 13 = |F₆|.">
<meta property="og:title" content="Stern-Brocot Walk: [0; 8, 1, 1, 3]">
<meta property="og:description" content="13 steps down the tree to 7/60. The depth is the Farey count that gives the cosmological partition.">
<meta property="og:type" content="website">
<title>Stern-Brocot Walk: [0; 8, 1, 1, 3]</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f; color: #c8c8d0;
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden; height: 100vh; width: 100vw;
  -webkit-text-size-adjust: 100%;
}
canvas { display: block; position: absolute; left: 0; }
#tree-canvas { top: 0; }
#tl-canvas { bottom: 0; }
#info {
  position: fixed; top: 16px; left: 16px; z-index: 10;
  font-size: 13px; line-height: 1.6; opacity: 0.7;
  pointer-events: none;
}
#info .frac { font-size: 20px; color: #e0e0ff; letter-spacing: 1px; }
#info .cf { color: #8888cc; }
#controls {
  position: fixed; top: 12px; right: 12px; z-index: 10;
  display: -webkit-flex; display: flex; gap: 8px;
}
.btn {
  background: none; border: 1px solid #444; color: #888;
  padding: 6px 14px; cursor: pointer;
  font-family: 'Courier New', Courier, monospace; font-size: 13px;
  -webkit-appearance: none; -moz-appearance: none;
  border-radius: 0; line-height: 1.4;
}
.btn:hover, .btn:focus { border-color: #888; color: #ccc; outline: none; }
noscript {
  display: block; padding: 40px; color: #8888cc;
  font-family: 'Courier New', Courier, monospace; font-size: 14px;
  line-height: 2;
}
</style>
</head>
<body>

<div id="info">
  <div class="frac">7/60</div>
  <div class="cf">[0; 8, 1, 1, 3] &mdash; depth 13 = |F&#8326;|</div>
  <div id="step-label" style="margin-top:8px; color:#666;"></div>
</div>

<div id="controls">
  <button class="btn" id="audio-btn">&#9834; sound</button>
  <button class="btn" id="replay-btn" style="display:none;">&#8634; replay</button>
</div>

<canvas id="tree-canvas"></canvas>
<canvas id="tl-canvas"></canvas>

<noscript>
  <pre>
Stern-Brocot walk to 7/60 = [0; 8, 1, 1, 3]

L  1/2
L  1/3
L  1/4
L  1/5
L  1/6
L  1/7
L  1/8
L  1/9    ── depth 8
R  2/17   ── turn
L  3/26   ── step
R  5/43   ── turn
R  7/60 ■ ── depth 13 = |F₆|
  </pre>
</noscript>

<script>
(function () {
  "use strict";

  // === DATA: Stern-Brocot walk from continued fraction [0; 8, 1, 1, 3] ===
  var walk = [];
  (function buildWalk() {
    var lNum = 0, lDen = 1, rNum = 1, rDen = 0;
    var cf = [8, 1, 1, 3];
    var goLeft = true;
    for (var i = 0; i < cf.length; i++) {
      for (var j = 0; j < cf[i]; j++) {
        var mNum = lNum + rNum;
        var mDen = lDen + rDen;
        var dir = goLeft ? "L" : "R";
        walk.push({ num: mNum, den: mDen, dir: dir, cfIndex: i, step: j });
        if (goLeft) { rNum = mNum; rDen = mDen; }
        else { lNum = mNum; lDen = mDen; }
      }
      goLeft = !goLeft;
    }
  })();

  // === CANVAS SETUP (hi-DPI aware) ===
  var treeCanvas = document.getElementById("tree-canvas");
  var treeCtx = treeCanvas.getContext("2d");
  var tlCanvas = document.getElementById("tl-canvas");
  var tlCtx = tlCanvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var W, H, TLH = 48;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight - TLH;

    treeCanvas.width = W * dpr;
    treeCanvas.height = H * dpr;
    treeCanvas.style.width = W + "px";
    treeCanvas.style.height = H + "px";
    treeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    tlCanvas.width = W * dpr;
    tlCanvas.height = TLH * dpr;
    tlCanvas.style.width = W + "px";
    tlCanvas.style.height = TLH + "px";
    tlCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener("resize", resize);

  // === AUDIO (Web Audio with full fallback) ===
  var audioCtx = null;
  var audioOn = false;
  var AudioCtor = window.AudioContext || window.webkitAudioContext || null;

  var audioBtn = document.getElementById("audio-btn");
  if (!AudioCtor) {
    audioBtn.style.display = "none";
  }

  audioBtn.addEventListener("click", function () {
    if (!AudioCtor) return;
    if (!audioCtx) {
      try { audioCtx = new AudioCtor(); } catch (e) { return; }
    }
    audioOn = !audioOn;
    audioBtn.textContent = audioOn ? "\u266A mute" : "\u266A sound";
    if (audioOn && audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  });

  function playStep(fraction, dir, depth) {
    if (!audioOn || !audioCtx) return;
    var now = audioCtx.currentTime;
    var baseFreq = 120 + fraction * 400;
    var overtone = baseFreq * (1 + depth * 0.08);
    var freq = dir === "L" ? baseFreq : overtone;

    try {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      var filter = audioCtx.createBiquadFilter();

      osc.type = dir === "L" ? "sine" : "triangle";
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.7, 20), now + 0.6);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(800 + fraction * 2000, now);
      filter.Q.setValueAtTime(2, now);

      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.8);

      // Soft harmonic
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.type = "sine";
      osc2.frequency.setValueAtTime(freq * 1.5, now);
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.linearRampToValueAtTime(0.03, now + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now);
      osc2.stop(now + 1.2);
    } catch (e) { /* audio failed gracefully */ }
  }

  function playArrival() {
    if (!audioOn || !audioCtx) return;
    var now = audioCtx.currentTime;
    var baseFreq = 120 + (7 / 60) * 400;
    var ratios = [1, 1.5, 2];
    try {
      for (var i = 0; i < ratios.length; i++) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(baseFreq * ratios[i], now + i * 0.1);
        gain.gain.setValueAtTime(0, now + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.08, now + i * 0.1 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + 2.5);
      }
    } catch (e) { /* audio failed gracefully */ }
  }

  // === ANIMATION STATE ===
  var animStep = -1;
  var stepTimer = 0;
  var STEP_DURATION = 550;
  var PAUSE_AFTER = 2000;
  var arrived = false;
  var running = false;

  var replayBtn = document.getElementById("replay-btn");
  replayBtn.addEventListener("click", function () {
    animStep = -1;
    stepTimer = 0;
    arrived = false;
    replayBtn.style.display = "none";
    startWalk();
  });

  // === COLORS ===
  // L8=blue, R1=amber, L1=amber, R3=green
  var cfColors = ["#4466aa", "#aa6644", "#aa6644", "#66aa66"];
  var cfGlow   = ["#6688dd", "#dd8866", "#dd8866", "#88dd88"];

  // === DRAWING ===
  function fracStr(n, d) { return d === 1 ? "" + n : n + "/" + d; }

  function drawTree(t) {
    treeCtx.clearRect(0, 0, W, H);

    // F6 background grid
    treeCtx.save();
    treeCtx.globalAlpha = 0.06;
    treeCtx.strokeStyle = "#4444aa";
    treeCtx.lineWidth = 0.5;
    var f6 = [0, 1/6, 1/5, 1/4, 1/3, 2/5, 1/2, 3/5, 2/3, 3/4, 4/5, 5/6, 1];
    var margin = Math.max(40, W * 0.06);
    var usableW = W - margin * 2;
    for (var fi = 0; fi < f6.length; fi++) {
      var fx = margin + f6[fi] * usableW;
      treeCtx.beginPath();
      treeCtx.moveTo(fx, 30);
      treeCtx.lineTo(fx, H - 10);
      treeCtx.stroke();
    }
    treeCtx.restore();

    // Walk path
    var usableH = H - 120;
    var stepH = usableH / (walk.length + 1);
    var revealed = Math.min(animStep + 1, walk.length);

    // Edges
    var prevX = margin + 0.5 * usableW;
    var prevY = 50;
    var i, w, frac, x, y, ci;

    for (i = 0; i < revealed; i++) {
      w = walk[i];
      frac = w.num / w.den;
      x = margin + frac * usableW;
      y = 70 + (i + 1) * stepH;
      ci = w.cfIndex;

      treeCtx.strokeStyle = cfColors[ci];
      treeCtx.globalAlpha = (i === animStep) ? 0.8 : 0.45;
      treeCtx.lineWidth = (i === animStep) ? 2.5 : 1.2;
      treeCtx.beginPath();
      treeCtx.moveTo(prevX, prevY);
      treeCtx.lineTo(x, y);
      treeCtx.stroke();
      treeCtx.globalAlpha = 1;

      prevX = x;
      prevY = y;
    }

    // Nodes + labels
    for (i = 0; i < revealed; i++) {
      w = walk[i];
      frac = w.num / w.den;
      x = margin + frac * usableW;
      y = 70 + (i + 1) * stepH;
      ci = w.cfIndex;
      var isCurrent = (i === animStep);

      // Glow
      if (isCurrent) {
        var grad = treeCtx.createRadialGradient(x, y, 0, x, y, 30);
        grad.addColorStop(0, cfGlow[ci] + "40");
        grad.addColorStop(1, "rgba(0,0,0,0)");
        treeCtx.fillStyle = grad;
        treeCtx.fillRect(x - 30, y - 30, 60, 60);
      }

      // Dot
      var r = isCurrent ? 5 : 3;
      treeCtx.beginPath();
      treeCtx.arc(x, y, r, 0, Math.PI * 2);
      treeCtx.fillStyle = isCurrent ? cfGlow[ci] : cfColors[ci];
      treeCtx.fill();

      // Fraction label
      var fontSize = isCurrent ? 13 : 10;
      treeCtx.fillStyle = isCurrent ? "#e0e0f0" : "#555";
      treeCtx.font = fontSize + "px 'Courier New', Courier, monospace";
      var label = fracStr(w.num, w.den);
      var tw = treeCtx.measureText(label).width;
      var labelX = (w.dir === "L") ? x - tw - 10 : x + 10;
      // Keep labels on screen
      if (labelX < 4) labelX = x + 10;
      if (labelX + tw > W - 4) labelX = x - tw - 10;
      treeCtx.fillText(label, labelX, y + 4);

      // Direction letter on current step
      if (isCurrent) {
        treeCtx.fillStyle = cfColors[ci];
        treeCtx.font = "10px 'Courier New', Courier, monospace";
        treeCtx.fillText(w.dir, x + (w.dir === "L" ? 8 : -14), y - 10);
      }
    }

    // Arrival
    if (arrived) {
      frac = 7 / 60;
      x = margin + frac * usableW;
      y = 70 + walk.length * stepH;
      var pulse = 0.5 + 0.5 * Math.sin(t * 0.003);

      var arrGrad = treeCtx.createRadialGradient(x, y, 0, x, y, 40 + pulse * 20);
      arrGrad.addColorStop(0, "rgba(200,200,255,0.15)");
      arrGrad.addColorStop(1, "rgba(0,0,0,0)");
      treeCtx.fillStyle = arrGrad;
      treeCtx.fillRect(x - 60, y - 60, 120, 120);

      treeCtx.beginPath();
      treeCtx.arc(x, y, 6 + pulse * 2, 0, Math.PI * 2);
      treeCtx.fillStyle = "#c0c0ff";
      treeCtx.fill();

      treeCtx.fillStyle = "#e0e0ff";
      treeCtx.font = "14px 'Courier New', Courier, monospace";
      treeCtx.fillText("7/60", x + 14, y + 5);

      treeCtx.fillStyle = "#666";
      treeCtx.font = "11px 'Courier New', Courier, monospace";
      treeCtx.fillText("depth 13 = |F\u2086|", x + 14, y + 22);
    }

    // Legend
    treeCtx.font = "11px 'Courier New', Courier, monospace";
    var legendX = W - 120;
    var legendY = H - 80;
    var segments = ["L\u2078", "R\u00B9", "L\u00B9", "R\u00B3"];
    for (i = 0; i < segments.length; i++) {
      var hl = animStep >= 0 && walk[animStep] && walk[animStep].cfIndex === i;
      treeCtx.fillStyle = hl ? cfGlow[i] : cfColors[i];
      treeCtx.globalAlpha = hl ? 1 : 0.4;
      treeCtx.fillText(segments[i], legendX, legendY + i * 18);
    }
    treeCtx.globalAlpha = 1;
  }

  function drawTimeline() {
    tlCtx.clearRect(0, 0, W, TLH);
    var total = walk.length;
    var segW = W / total;

    for (var i = 0; i < total; i++) {
      var w = walk[i];
      var ci = w.cfIndex;
      var rev = i <= animStep;
      var cur = i === animStep;

      tlCtx.fillStyle = rev ? cfColors[ci] : "#14141e";
      if (cur) tlCtx.fillStyle = cfGlow[ci];
      tlCtx.fillRect(i * segW + 1, 8, segW - 2, 32);

      if (rev) {
        tlCtx.fillStyle = cur ? "#fff" : "#111";
        tlCtx.font = "9px 'Courier New', Courier, monospace";
        var ch = w.dir;
        var chW = tlCtx.measureText(ch).width;
        tlCtx.fillText(ch, i * segW + (segW - chW) / 2, 28);
      }
    }
  }

  function updateLabel() {
    var el = document.getElementById("step-label");
    if (animStep < 0) { el.textContent = ""; return; }
    if (arrived) {
      el.textContent = "arrived.";
      el.style.color = "#8888cc";
      return;
    }
    var w = walk[animStep];
    var dir = w.dir === "L" ? "descend left" : "turn right";
    el.textContent = "step " + (animStep + 1) + "/13: " + dir + " \u2192 " + w.num + "/" + w.den;
    el.style.color = cfColors[w.cfIndex];
  }

  // === MAIN LOOP ===
  var lastTime = 0;
  var raf = window.requestAnimationFrame
         || window.webkitRequestAnimationFrame
         || function (cb) { return setTimeout(cb, 16); };

  function frame(ts) {
    if (!ts) ts = +new Date();
    var dt = lastTime ? ts - lastTime : 16;
    lastTime = ts;

    if (!arrived) {
      stepTimer += dt;
      if (stepTimer >= STEP_DURATION && animStep < walk.length - 1) {
        animStep++;
        stepTimer = 0;
        var w = walk[animStep];
        playStep(w.num / w.den, w.dir, animStep);
        updateLabel();
      }
      if (animStep >= walk.length - 1 && stepTimer >= PAUSE_AFTER && !arrived) {
        arrived = true;
        playArrival();
        updateLabel();
        replayBtn.style.display = "inline-block";
      }
    }

    drawTree(ts);
    drawTimeline();
    raf(frame);
  }

  function startWalk() {
    if (running) return;
    running = true;
    lastTime = 0;
    stepTimer = 0;
    setTimeout(function () {
      animStep = 0;
      var w = walk[0];
      playStep(w.num / w.den, w.dir, 0);
      updateLabel();
      raf(frame);
    }, 600);
  }

  startWalk();
})();
</script>
</body>
</html>
