<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Möbius Views</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;height:100vh;font-family:'Courier New',monospace}
canvas{display:block}
.panel{position:absolute;overflow:hidden}
.panel-label{
  position:absolute;bottom:4px;left:6px;
  font-size:9px;color:#333;pointer-events:none;z-index:2;
}
#info{
  position:fixed;top:0;left:0;right:0;z-index:10;
  text-align:center;font-size:10px;color:#2a2a35;
  padding:6px;pointer-events:none;
}
</style>
</head>
<body>
<div id="info">click for sound</div>

<script>
(function(){
"use strict";

// === FAREY SKELETON ===
var F6 = [[0,1],[1,6],[1,5],[1,4],[1,3],[2,5],[1,2],[3,5],[2,3],[3,4],[4,5],[5,6],[1,1]];
var F6f = [], F6w = [], F6c = [], wSum = 0;
for (var i = 0; i < F6.length; i++) {
  F6f.push(F6[i][0]/F6[i][1]);
  var q = F6[i][1]||1, w = 1/(q*q);
  F6w.push(w); wSum += w;
}
var run = 0;
for (i = 0; i < F6w.length; i++) { run += F6w[i]/wSum; F6c.push(run); }

function fareyWarp(p) {
  p = ((p%1)+1)%1;
  for (var i = 0; i < F6c.length; i++) {
    if (p <= F6c[i]) {
      var p0 = i>0?F6c[i-1]:0, f0 = i>0?F6f[i-1]:0, f1 = F6f[i];
      return f0 + (p-p0)/(F6c[i]-p0) * (f1-f0);
    }
  }
  return p;
}

// === LAYOUT: 4 panels ===
var panels = [];
var canvases = [];
var ctxs = [];
var labels = ["the strip", "both sides", "the ring", "the exchange"];
var W, H, dpr;

function createPanels() {
  W = window.innerWidth; H = window.innerHeight;
  dpr = window.devicePixelRatio||1;
  // Remove old
  for (i = 0; i < canvases.length; i++) canvases[i].parentNode.removeChild(canvases[i].parentNode);
  canvases = []; ctxs = []; panels = [];

  var gutter = 2;
  var pw = Math.floor((W-gutter)/2);
  var ph = Math.floor((H-gutter)/2);
  var positions = [[0,0],[pw+gutter,0],[0,ph+gutter],[pw+gutter,ph+gutter]];

  for (i = 0; i < 4; i++) {
    var div = document.createElement("div");
    div.className = "panel";
    div.style.left = positions[i][0]+"px";
    div.style.top = positions[i][1]+"px";
    div.style.width = pw+"px";
    div.style.height = ph+"px";

    var c = document.createElement("canvas");
    c.width = pw*dpr; c.height = ph*dpr;
    c.style.width = pw+"px"; c.style.height = ph+"px";
    var ctx = c.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);

    var lbl = document.createElement("div");
    lbl.className = "panel-label";
    lbl.textContent = labels[i];

    div.appendChild(c);
    div.appendChild(lbl);
    document.body.appendChild(div);

    panels.push({x:positions[i][0],y:positions[i][1],w:pw,h:ph});
    canvases.push(c);
    ctxs.push(ctx);
  }
}
createPanels();
window.addEventListener("resize", createPanels);

// === AUDIO ===
var AC = window.AudioContext||window.webkitAudioContext||null;
var ac = null, mg = null, drone = null, dg = null;
function initAudio(){
  if(!AC||ac)return;
  try{
    ac=new AC(); mg=ac.createGain(); mg.gain.value=0.12; mg.connect(ac.destination);
    drone=ac.createOscillator(); dg=ac.createGain();
    drone.type="sine"; drone.frequency.value=110; dg.gain.value=0;
    drone.connect(dg); dg.connect(mg); drone.start();
  }catch(e){}
}
document.addEventListener("click",function(){initAudio();document.getElementById("info").style.display="none";});

function setDrone(freq,amp){
  if(!ac)return;var n=ac.currentTime;
  drone.frequency.setTargetAtTime(Math.max(20,freq),n,0.06);
  dg.gain.setTargetAtTime(amp,n,0.06);
}

// === TIME ===
var CYCLE = 10; // seconds
var elapsed = 0, lastT = 0;

// === DRAWING ===

// Helper: gradient value on the strip
function stripVal(x, phase, inv) {
  var v = ((x + phase)%1+1)%1;
  return inv ? 1-v : v;
}

// Helper: warm/cool color from value and inversion state
function toColor(v, inv, alpha) {
  var r,g,b;
  if (!inv) { r=v*170+15; g=v*130+12; b=v*80+15; }
  else { r=v*80+15; g=v*120+15; b=v*170+20; }
  return "rgba("+Math.round(r)+","+Math.round(g)+","+Math.round(b)+","+(alpha||1)+")";
}

function drawAll(t) {
  var phase = (elapsed/1000/CYCLE)%1;
  var wp = fareyWarp(phase);
  var inv = wp >= 0.5;
  var sp = (wp*2)%1;

  // Twist proximity
  var td = Math.min(Math.abs(wp-0.5), Math.abs(wp-1), wp);
  var twist = Math.max(0, 1-td*25);

  var pw, ph, ctx, x, y, v, cols;

  // === PANEL 0: THE STRIP (filmstrip, one regime at a time) ===
  pw = panels[0].w; ph = panels[0].h;
  ctx = ctxs[0];
  ctx.clearRect(0,0,pw,ph);
  cols = Math.min(pw, 300);
  var cw = pw/cols;
  for (i = 0; i < cols; i++) {
    x = i/cols;
    v = stripVal(x, sp, inv);
    // Twist noise
    if (twist > 0) {
      var n = (Math.sin(x*271.3+elapsed*0.07)*0.5+0.5);
      v = v*(1-twist) + n*twist;
    }
    ctx.fillStyle = toColor(v, inv);
    ctx.fillRect(i*cw, 0, cw+1, ph);
  }
  // Sprocket holes at Farey positions
  ctx.fillStyle = "#000";
  ctx.globalAlpha = 0.35;
  for (i = 0; i < F6f.length; i++) {
    var hx = ((F6f[i]+sp*0.3)%1)*pw;
    var hw = 4 + 6/(F6[i][1]||1);
    ctx.fillRect(hx-hw/2, 1, hw, 7);
    ctx.fillRect(hx-hw/2, ph-8, hw, 7);
  }
  ctx.globalAlpha = 1;

  // === PANEL 1: BOTH SIDES (normal + inverted overlaid) ===
  pw = panels[1].w; ph = panels[1].h;
  ctx = ctxs[1];
  ctx.clearRect(0,0,pw,ph);
  cols = Math.min(pw, 300);
  cw = pw/cols;
  for (i = 0; i < cols; i++) {
    x = i/cols;
    var vNorm = stripVal(x, sp, false);
    var vInv  = stripVal(x, sp, true);

    // Interference: where they agree = bright, differ = dark
    var agreement = 1 - Math.abs(vNorm - vInv);
    // The beat pattern: constructive at simple fractions
    var combined = (vNorm + vInv) * 0.5;
    var interference = combined * agreement;

    // Residual: what one side has that the other doesn't
    var residual = Math.abs(vNorm - vInv);

    // Top half: the interference (what "reality" looks like)
    var hy = ph * 0.5;
    var bright = interference;
    ctx.fillStyle = "rgb("+
      Math.round(bright*200+10)+","+
      Math.round(bright*200+10)+","+
      Math.round(bright*180+20)+")";
    ctx.fillRect(i*cw, 0, cw+1, hy);

    // Bottom half: the residual (the information from the "other side")
    // This is always present. It's not hidden — it's the complement.
    var rr = residual;
    ctx.fillStyle = "rgb("+
      Math.round(rr*60+5)+","+
      Math.round(rr*40+5)+","+
      Math.round(rr*90+8)+")";
    ctx.fillRect(i*cw, hy, cw+1, hy);
  }
  // Divider
  ctx.strokeStyle = "#222";
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, ph*0.5);
  ctx.lineTo(pw, ph*0.5);
  ctx.stroke();
  // Labels
  ctx.font = "9px 'Courier New'";
  ctx.fillStyle = "#2a2a2a";
  ctx.fillText("agreement", 4, 12);
  ctx.fillText("residual", 4, ph*0.5+12);

  // === PANEL 2: THE RING (Möbius band from above) ===
  pw = panels[2].w; ph = panels[2].h;
  ctx = ctxs[2];
  ctx.clearRect(0,0,pw,ph);
  var cx = pw/2, cy = ph/2;
  var outerR = Math.min(pw,ph)*0.38;
  var innerR = outerR * 0.6;
  var nSeg = 180;

  // Draw the band: outer edge to inner edge, color follows the strip
  for (i = 0; i < nSeg; i++) {
    var a0 = (i/nSeg)*Math.PI*2;
    var a1 = ((i+1)/nSeg)*Math.PI*2;
    var bandPhase = i/nSeg; // position along the strip [0,1)
    var stripPos = (bandPhase + wp) % 1;
    var bandInv = stripPos >= 0.5;
    var bandVal = ((stripPos*2)%1);
    if (bandInv) bandVal = 1-bandVal;

    // The twist: at stripPos=0.5 and 1.0, the band "flips"
    var bandTwist = Math.min(Math.abs(stripPos-0.5), Math.abs(stripPos-1), stripPos);
    var bTw = Math.max(0, 1-bandTwist*15);

    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a0)*outerR, cy+Math.sin(a0)*outerR);
    ctx.lineTo(cx+Math.cos(a1)*outerR, cy+Math.sin(a1)*outerR);
    ctx.lineTo(cx+Math.cos(a1)*innerR, cy+Math.sin(a1)*innerR);
    ctx.lineTo(cx+Math.cos(a0)*innerR, cy+Math.sin(a0)*innerR);
    ctx.closePath();

    if (bTw > 0.3) {
      // Twist region: white flash
      var fl = (bTw-0.3)*1.4;
      ctx.fillStyle = "rgba(200,200,220,"+(fl*0.3).toFixed(2)+")";
    } else {
      ctx.fillStyle = toColor(bandVal, bandInv, 0.6);
    }
    ctx.fill();
  }

  // Current position indicator
  var posAngle = wp * Math.PI * 2;
  var posR = (outerR+innerR)/2;
  ctx.beginPath();
  ctx.arc(cx+Math.cos(posAngle)*posR, cy+Math.sin(posAngle)*posR, 3, 0, Math.PI*2);
  ctx.fillStyle = "#fff";
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Farey ticks on the ring
  ctx.globalAlpha = 0.12;
  for (i = 0; i < F6f.length; i++) {
    var fa = F6f[i] * Math.PI * 2;
    var fq = F6[i][1]||1;
    ctx.strokeStyle = "#888";
    ctx.lineWidth = 3/fq;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(fa)*(outerR+3), cy+Math.sin(fa)*(outerR+3));
    ctx.lineTo(cx+Math.cos(fa)*(outerR+6+8/fq), cy+Math.sin(fa)*(outerR+6+8/fq));
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // === PANEL 3: THE EXCHANGE (bit-level view) ===
  // Each row is one Farey fraction. Each column is a cycle.
  // The cell shows: does this fraction's bit agree between
  // normal and inverted at this moment?
  pw = panels[3].w; ph = panels[3].h;
  ctx = ctxs[3];
  ctx.clearRect(0,0,pw,ph);

  var nCycles = 24;
  var nFracs = F6f.length;
  var cellW = pw / nCycles;
  var cellH = ph / nFracs;
  var currentCycle = Math.floor(elapsed/1000/CYCLE);

  for (var row = 0; row < nFracs; row++) {
    var frac = F6f[row];
    var fq = F6[row][1]||1;
    for (var col = 0; col < nCycles; col++) {
      var cycleOffset = (currentCycle - nCycles + col + 1);
      var cyclePhase = ((cycleOffset * CYCLE * 1000 + elapsed) / 1000 / CYCLE) % 1;
      var cwp = fareyWarp(cyclePhase);
      var csp = (cwp*2)%1;
      var cinv = cwp >= 0.5;

      // Value at this fraction on each side
      var vN = stripVal(frac, csp, false);
      var vI = stripVal(frac, csp, true);
      var agree = 1 - Math.abs(vN - vI);

      // Current column highlighted
      var isCurrent = (col === nCycles - 1);
      var alpha = isCurrent ? 0.9 : 0.4;

      // Color: agreement = bright, disagreement = dim
      // Hue from the fraction's denominator
      var hueShift = (fq === 1) ? 0 : (fq === 2) ? 0.1 : (fq === 3) ? 0.3 : 0.5;
      var br = agree * 0.8 + 0.1;
      ctx.fillStyle = "rgba("+
        Math.round((br*140+20)*(1-hueShift))+","+
        Math.round(br*120+15)+","+
        Math.round((br*140+20)*(0.5+hueShift))+","+alpha+")";
      ctx.fillRect(col*cellW+0.5, row*cellH+0.5, cellW-1, cellH-1);

      // At the twist frame, mark it
      var cTd = Math.min(Math.abs(cwp-0.5),Math.abs(cwp-1),cwp);
      if (cTd < 0.04 && isCurrent) {
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 0.5;
        ctx.strokeRect(col*cellW+0.5, row*cellH+0.5, cellW-1, cellH-1);
      }
    }
    // Row label
    ctx.fillStyle = "#1a1a22";
    ctx.font = "8px 'Courier New'";
    ctx.fillText(F6[row][0]+"/"+F6[row][1], 2, row*cellH+cellH-2);
  }

  // === AUDIO ===
  if (ac) {
    var cv = stripVal(0.5, sp, inv);
    var freq = 80 + cv*180 + (inv?-30:30);
    if (twist > 0.3) freq *= (1-twist*0.6);
    setDrone(freq, 0.35);
  }
}

var raf = window.requestAnimationFrame || function(cb){return setTimeout(cb,16);};
function frame(ts) {
  if(!ts)ts=+new Date();
  if(!lastT)lastT=ts;
  elapsed+=ts-lastT;
  lastT=ts;
  drawAll(elapsed);
  raf(frame);
}
raf(frame);

})();
</script>
</body>
</html>
