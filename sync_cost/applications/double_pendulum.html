<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Double Pendulum: Tongue Structure</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #c8c8c8;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h1 { color: #e0e0e0; font-size: 16px; font-weight: normal; margin-bottom: 4px; }
.subtitle { color: #555; font-size: 11px; margin-bottom: 24px; }
h2 {
  color: #888; font-size: 12px; margin: 28px 0 8px;
  letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: normal; width: 100%; max-width: 820px;
}
canvas { display: block; margin: 8px auto; border: 1px solid #111; }
.row { display: flex; gap: 16px; align-items: flex-start; }
.panel { flex: 1; }
.stats {
  max-width: 820px; width: 100%;
  margin: 8px auto; padding: 10px;
  border-left: 2px solid #333;
  color: #777; font-size: 11px; white-space: pre;
}
.insight {
  max-width: 820px; width: 100%;
  margin: 12px auto; padding: 10px;
  border-left: 2px solid #c44;
  color: #aaa; font-size: 12px;
}
.controls {
  max-width: 820px; width: 100%;
  margin: 8px auto;
  display: flex; gap: 16px; align-items: center;
}
.controls label { color: #666; font-size: 11px; }
.controls input[type=range] { width: 200px; }
.controls .val { color: #aaa; font-size: 12px; min-width: 60px; }
</style>
</head>
<body>

<h1>Double Pendulum: Mode Locking and the Tongue Boundary</h1>
<div class="subtitle">equal mass, equal length — frequency ratio w1/w2 = 1 + sqrt(2) = 2.414...</div>

<h2>1. Simulation</h2>
<div class="controls">
  <label>Energy:</label>
  <input type="range" id="energy-slider" min="0" max="100" value="15">
  <span class="val" id="energy-val">0.15</span>
  <label style="margin-left:24px">Trail:</label>
  <input type="range" id="trail-slider" min="10" max="500" value="200">
  <span class="val" id="trail-val">200</span>
</div>

<div class="row">
  <div class="panel">
    <canvas id="pendulum" width="400" height="400"></canvas>
  </div>
  <div class="panel">
    <canvas id="phase" width="400" height="400"></canvas>
  </div>
</div>

<h2>2. Frequency ratio vs energy</h2>
<canvas id="freq-sweep" width="820" height="350"></canvas>
<div id="stats-freq" class="stats"></div>

<h2>3. Lyapunov exponent vs energy</h2>
<canvas id="lyap-sweep" width="820" height="300"></canvas>
<div id="stats-lyap" class="stats"></div>

<h2>Findings</h2>
<div id="findings" class="insight"></div>

<script>
const TAU = Math.PI * 2;
const RED = '#c44';
const BLUE = '#48c';
const PURPLE = '#a4c';
const ORANGE = '#c84';
const ORANGE_A = (a) => `rgba(204,136,68,${a})`;

// ═══════════════════════════════════════════════════════════════
// DOUBLE PENDULUM PHYSICS
// ═══════════════════════════════════════════════════════════════

const g = 9.81;
const L1 = 1, L2 = 1, m1 = 1, m2 = 1;

function derivs(state) {
  // state = [theta1, omega1, theta2, omega2]
  const [t1, w1, t2, w2] = state;
  const dt = t1 - t2;
  const sinDt = Math.sin(dt);
  const cosDt = Math.cos(dt);
  const M = m1 + m2;

  const den = M * L1 - m2 * L1 * cosDt * cosDt;

  const a1 = (m2 * L1 * w1 * w1 * sinDt * cosDt
            + m2 * g * Math.sin(t2) * cosDt
            + m2 * L2 * w2 * w2 * sinDt
            - M * g * Math.sin(t1)) / den;

  const a2 = (-m2 * L2 * w2 * w2 * sinDt * cosDt
            + M * (g * Math.sin(t1) * cosDt
                  - L1 * w1 * w1 * sinDt
                  - g * Math.sin(t2))) / (den * L2 / L1);

  return [w1, a1, w2, a2];
}

function rk4Step(state, dt) {
  const k1 = derivs(state);
  const s2 = state.map((v, i) => v + k1[i] * dt / 2);
  const k2 = derivs(s2);
  const s3 = state.map((v, i) => v + k2[i] * dt / 2);
  const k3 = derivs(s3);
  const s4 = state.map((v, i) => v + k3[i] * dt / 2);
  const k4 = derivs(s4);
  return state.map((v, i) => v + (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]) * dt / 6);
}

function totalEnergy(state) {
  const [t1, w1, t2, w2] = state;
  const KE = 0.5 * (m1 + m2) * L1*L1 * w1*w1
           + 0.5 * m2 * L2*L2 * w2*w2
           + m2 * L1 * L2 * w1 * w2 * Math.cos(t1 - t2);
  const PE = -(m1 + m2) * g * L1 * Math.cos(t1)
           - m2 * g * L2 * Math.cos(t2);
  return KE + PE;
}

function stateFromEnergy(E_target) {
  // Start with theta1 = angle, theta2 = 0, omega2 = 0
  // Solve for omega1 (or theta1)
  // PE at rest = -(m1+m2)*g*L1 - m2*g*L2
  const PE_rest = -(m1 + m2) * g * L1 - m2 * g * L2;
  const dE = E_target - PE_rest;

  if (dE < 0) return [0.01, 0, 0.005, 0];

  // Use theta1 = angle, others = 0, compute needed omega1
  // For moderate energy: theta1 = some angle
  // KE = 0.5*(m1+m2)*L1^2 * w1^2 when w2=0, t2=0
  // Total = KE + PE(t1,0)
  // Try angle based on energy
  const maxAngle = Math.min(Math.PI * 0.95, dE / ((m1+m2)*g*L1) + 0.01);
  const t1 = Math.min(maxAngle, Math.PI * 0.9);
  const PE_now = -(m1 + m2) * g * L1 * Math.cos(t1) - m2 * g * L2;
  const KE_need = E_target - PE_now;

  if (KE_need > 0) {
    const w1 = Math.sqrt(2 * KE_need / ((m1 + m2) * L1 * L1));
    return [t1 * 0.3, w1, t1 * 0.15, 0];
  }
  return [t1, 0, t1 * 0.5, 0];
}

// ═══════════════════════════════════════════════════════════════
// INTERACTIVE SIMULATION
// ═══════════════════════════════════════════════════════════════

const pendCvs = document.getElementById('pendulum');
const pendCtx = pendCvs.getContext('2d');
const phaseCvs = document.getElementById('phase');
const phaseCtx = phaseCvs.getContext('2d');

const energySlider = document.getElementById('energy-slider');
const energyVal = document.getElementById('energy-val');
const trailSlider = document.getElementById('trail-slider');
const trailVal = document.getElementById('trail-val');

let simState = [0.5, 0, 0.25, 0];
let trail2 = []; // tip of second pendulum
let phaseTrail = []; // (theta1, theta2)
let maxTrail = 200;

function resetSim() {
  const E_frac = energySlider.value / 100;
  const PE_rest = -(m1 + m2) * g * L1 - m2 * g * L2;
  const E_max = (m1 + m2) * g * L1 + m2 * g * L2; // all up
  const E_target = PE_rest + E_frac * (E_max - PE_rest) * 2;
  energyVal.textContent = E_frac.toFixed(2);

  // Set initial conditions from energy
  const angle = E_frac * Math.PI * 0.95;
  simState = [angle + 0.01, 0, angle * 0.5, 0];
  trail2 = [];
  phaseTrail = [];
}

energySlider.addEventListener('input', resetSim);
trailSlider.addEventListener('input', () => {
  maxTrail = parseInt(trailSlider.value);
  trailVal.textContent = maxTrail;
});

function drawPendulum() {
  const W = pendCvs.width, H = pendCvs.height;
  const cx = W / 2, cy = H * 0.3;
  const scale = W * 0.18;

  pendCtx.fillStyle = 'rgba(0,0,0,0.3)';
  pendCtx.fillRect(0, 0, W, H);

  // Advance simulation
  const dt = 0.002;
  for (let i = 0; i < 8; i++) {
    simState = rk4Step(simState, dt);
  }

  const [t1, w1, t2, w2] = simState;
  const x1 = cx + L1 * scale * Math.sin(t1);
  const y1 = cy + L1 * scale * Math.cos(t1);
  const x2 = x1 + L2 * scale * Math.sin(t2);
  const y2 = y1 + L2 * scale * Math.cos(t2);

  trail2.push({ x: x2, y: y2 });
  if (trail2.length > maxTrail) trail2.shift();

  phaseTrail.push({ x: t1, y: t2 });
  if (phaseTrail.length > maxTrail) phaseTrail.shift();

  // Trail
  for (let i = 1; i < trail2.length; i++) {
    const a = i / trail2.length;
    pendCtx.strokeStyle = ORANGE_A(a * 0.55);
    pendCtx.lineWidth = 1;
    pendCtx.beginPath();
    pendCtx.moveTo(trail2[i-1].x, trail2[i-1].y);
    pendCtx.lineTo(trail2[i].x, trail2[i].y);
    pendCtx.stroke();
  }

  // Rods
  pendCtx.strokeStyle = ORANGE_A(0.5);
  pendCtx.lineWidth = 2;
  pendCtx.beginPath();
  pendCtx.moveTo(cx, cy);
  pendCtx.lineTo(x1, y1);
  pendCtx.lineTo(x2, y2);
  pendCtx.stroke();

  // Pivot
  pendCtx.fillStyle = '#444';
  pendCtx.beginPath();
  pendCtx.arc(cx, cy, 3, 0, TAU);
  pendCtx.fill();

  // Masses
  pendCtx.fillStyle = ORANGE;
  pendCtx.beginPath();
  pendCtx.arc(x1, y1, 6, 0, TAU);
  pendCtx.fill();

  pendCtx.fillStyle = ORANGE_A(0.8);
  pendCtx.beginPath();
  pendCtx.arc(x2, y2, 5, 0, TAU);
  pendCtx.fill();

  // Energy label
  const E = totalEnergy(simState);
  pendCtx.fillStyle = ORANGE_A(0.4);
  pendCtx.font = '10px Courier New';
  pendCtx.textAlign = 'left';
  pendCtx.fillText(`E = ${E.toFixed(2)}`, 8, 16);
}

function drawPhase() {
  const W = phaseCvs.width, H = phaseCvs.height;
  const margin = 30;
  const pw = W - 2 * margin;
  const ph = H - 2 * margin;

  phaseCtx.fillStyle = 'rgba(0,0,0,0.15)';
  phaseCtx.fillRect(0, 0, W, H);

  // Axes
  phaseCtx.strokeStyle = '#1a1a1a';
  phaseCtx.lineWidth = 0.5;
  phaseCtx.beginPath();
  phaseCtx.moveTo(margin, H / 2);
  phaseCtx.lineTo(W - margin, H / 2);
  phaseCtx.stroke();
  phaseCtx.beginPath();
  phaseCtx.moveTo(W / 2, margin);
  phaseCtx.lineTo(W / 2, H - margin);
  phaseCtx.stroke();

  // Plot (theta1 mod 2pi, theta2 mod 2pi) as phase portrait
  const scale = pw / (TAU * 1.2);
  const cx = W / 2, cy = H / 2;

  for (let i = 1; i < phaseTrail.length; i++) {
    const a = i / phaseTrail.length;
    phaseCtx.fillStyle = ORANGE_A(a * 0.6);
    const x = cx + phaseTrail[i].x * scale;
    const y = cy + phaseTrail[i].y * scale;
    phaseCtx.fillRect(x - 0.5, y - 0.5, 1.5, 1.5);
  }

  // Labels
  phaseCtx.fillStyle = '#333';
  phaseCtx.font = '9px Courier New';
  phaseCtx.textAlign = 'center';
  phaseCtx.fillText('theta1', W / 2, H - 8);
  phaseCtx.save();
  phaseCtx.translate(10, H / 2);
  phaseCtx.rotate(-Math.PI / 2);
  phaseCtx.fillText('theta2', 0, 0);
  phaseCtx.restore();

  // Rational lines: theta2/theta1 = p/q
  phaseCtx.strokeStyle = 'rgba(68,136,204,0.1)';
  phaseCtx.lineWidth = 0.5;
  const rats = [[1,1], [2,1], [1,2], [3,1], [1,3], [5,2], [2,5], [12,5], [5,12]];
  for (const [p, q] of rats) {
    phaseCtx.beginPath();
    phaseCtx.moveTo(cx, cy);
    phaseCtx.lineTo(cx + Math.PI * scale, cy + Math.PI * (p/q) * scale);
    phaseCtx.stroke();
  }
}

function animate() {
  drawPendulum();
  drawPhase();
  requestAnimationFrame(animate);
}

resetSim();
animate();

// ═══════════════════════════════════════════════════════════════
// FREQUENCY SWEEP
// ═══════════════════════════════════════════════════════════════

function computeFreqSweep() {
  const c = document.getElementById('freq-sweep');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const margin = { t: 25, r: 30, b: 35, l: 55 };
  const pw = W - margin.l - margin.r;
  const ph = H - margin.t - margin.b;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Sweep energy and compute dominant frequency ratio
  const nSteps = 80;
  const results = [];

  for (let ei = 1; ei <= nSteps; ei++) {
    const E_frac = ei / nSteps;
    const angle = E_frac * Math.PI * 0.92;
    let state = [angle + 0.01, 0, angle * 0.4, 0];

    // Run simulation, collect theta1 time series
    const dt = 0.003;
    const warmup = 500;
    const samples = 2000;
    const t1_series = [];
    const t2_series = [];

    for (let i = 0; i < warmup; i++) state = rk4Step(state, dt);
    for (let i = 0; i < samples; i++) {
      state = rk4Step(state, dt);
      t1_series.push(state[0]);
      t2_series.push(state[2]);
    }

    // Estimate dominant frequencies by zero-crossing count
    let crossings1 = 0, crossings2 = 0;
    for (let i = 1; i < samples; i++) {
      if (t1_series[i] * t1_series[i-1] < 0) crossings1++;
      if (t2_series[i] * t2_series[i-1] < 0) crossings2++;
    }

    const freq1 = crossings1 / (2 * samples * dt);
    const freq2 = crossings2 / (2 * samples * dt);
    const ratio = freq2 > 0.01 ? freq1 / freq2 : NaN;

    // Estimate regularity: variance of inter-crossing intervals
    const intervals1 = [];
    let lastCross = 0;
    for (let i = 1; i < samples; i++) {
      if (t1_series[i] * t1_series[i-1] < 0) {
        if (lastCross > 0) intervals1.push(i - lastCross);
        lastCross = i;
      }
    }
    const meanInt = intervals1.length > 0 ? intervals1.reduce((a,b) => a+b) / intervals1.length : 0;
    const varInt = intervals1.length > 1 ?
      intervals1.reduce((a,b) => a + (b - meanInt) ** 2, 0) / intervals1.length : 0;
    const regularity = meanInt > 0 ? Math.sqrt(varInt) / meanInt : 1; // CV

    const E = totalEnergy(state);
    results.push({ E_frac, E, ratio, regularity, freq1, freq2 });
  }

  // Draw grid
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = margin.t + (i / 5) * ph;
    ctx.beginPath(); ctx.moveTo(margin.l, y); ctx.lineTo(W - margin.r, y); ctx.stroke();
  }

  // Rational reference lines
  const ratLines = [
    { r: 1, label: '1:1' },
    { r: 2, label: '2:1' },
    { r: 5/2, label: '5:2' },
    { r: 12/5, label: '12:5' },
    { r: 1 + Math.sqrt(2), label: '1+√2' },
    { r: 3, label: '3:1' },
  ];

  const minR = 0.5, maxR = 4;
  for (const rl of ratLines) {
    if (rl.r < minR || rl.r > maxR) continue;
    const y = margin.t + ph - ((rl.r - minR) / (maxR - minR)) * ph;
    ctx.strokeStyle = rl.label === '1+√2' ? 'rgba(170,68,204,0.3)' : 'rgba(68,136,204,0.15)';
    ctx.lineWidth = rl.label === '1+√2' ? 1 : 0.5;
    ctx.setLineDash(rl.label === '1+√2' ? [] : [3, 5]);
    ctx.beginPath();
    ctx.moveTo(margin.l, y);
    ctx.lineTo(W - margin.r, y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = rl.label === '1+√2' ? PURPLE : '#333';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(rl.label, W - margin.r + 3, y + 3);
  }

  // Plot frequency ratio
  for (let i = 0; i < results.length; i++) {
    const r = results[i];
    if (isNaN(r.ratio) || r.ratio > maxR || r.ratio < minR) continue;

    const x = margin.l + (r.E_frac) * pw;
    const y = margin.t + ph - ((r.ratio - minR) / (maxR - minR)) * ph;

    // Color by regularity: regular = orange, chaotic = purple
    const chaos = Math.min(r.regularity * 3, 1);
    const cr = Math.round(204 * (1 - chaos) + 170 * chaos);
    const cg = Math.round(136 * (1 - chaos) + 68 * chaos);
    const cb = Math.round(68 * (1 - chaos) + 204 * chaos);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},0.7)`;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, TAU);
    ctx.fill();
  }

  // Axes
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin.l, margin.t);
  ctx.lineTo(margin.l, margin.t + ph);
  ctx.lineTo(margin.l + pw, margin.t + ph);
  ctx.stroke();

  ctx.fillStyle = '#555';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('Energy (fraction of max)', W / 2, H - 4);
  ctx.save();
  ctx.translate(14, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Frequency ratio w1/w2', 0, 0);
  ctx.restore();

  // Legend
  ctx.fillStyle = ORANGE;
  ctx.beginPath(); ctx.arc(W - margin.r - 60, margin.t + 12, 4, 0, TAU); ctx.fill();
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText('regular', W - margin.r - 52, margin.t + 15);

  ctx.fillStyle = PURPLE;
  ctx.beginPath(); ctx.arc(W - margin.r - 60, margin.t + 28, 4, 0, TAU); ctx.fill();
  ctx.fillStyle = '#555';
  ctx.fillText('chaotic', W - margin.r - 52, margin.t + 31);

  // Stats
  const small_angle = Math.sqrt((2 + Math.sqrt(2)) / (2 - Math.sqrt(2)));
  document.getElementById('stats-freq').textContent =
    `  Small-angle ratio: w1/w2 = 1 + sqrt(2) = ${small_angle.toFixed(6)}\n` +
    `  This is IRRATIONAL — the double pendulum is born in a gap, not a tongue.\n` +
    `  Nearest simple rationals: 12/5 (q=5, err=0.59%), 29/12 (q=12, err=0.10%)\n\n` +
    `  At low energy: ratio near 1+sqrt(2), regular motion (orange)\n` +
    `  At high energy: ratio wanders, chaotic (purple)\n` +
    `  The transition is where the effective coupling crosses a tongue boundary.`;

  return results;
}

// ═══════════════════════════════════════════════════════════════
// LYAPUNOV SWEEP
// ═══════════════════════════════════════════════════════════════

function computeLyapSweep() {
  const c = document.getElementById('lyap-sweep');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const margin = { t: 20, r: 30, b: 35, l: 55 };
  const pw = W - margin.l - margin.r;
  const ph = H - margin.t - margin.b;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const nSteps = 60;
  const results = [];

  for (let ei = 1; ei <= nSteps; ei++) {
    const E_frac = ei / nSteps;
    const angle = E_frac * Math.PI * 0.92;
    let state = [angle + 0.01, 0, angle * 0.4, 0];

    // Compute maximal Lyapunov exponent by tracking divergence
    const eps = 1e-7;
    let state2 = state.map((v, i) => i === 0 ? v + eps : v);

    const dt = 0.003;
    let lyapSum = 0;
    let lyapCount = 0;

    // Warmup
    for (let i = 0; i < 300; i++) {
      state = rk4Step(state, dt);
      state2 = rk4Step(state2, dt);
    }

    // Measure
    for (let i = 0; i < 1500; i++) {
      state = rk4Step(state, dt);
      state2 = rk4Step(state2, dt);

      // Distance between trajectories
      let d2 = 0;
      for (let j = 0; j < 4; j++) d2 += (state[j] - state2[j]) ** 2;
      const dist = Math.sqrt(d2);

      if (dist > 0 && dist < 1) {
        lyapSum += Math.log(dist / eps);
        lyapCount++;
      }

      // Renormalize
      if (dist > eps * 100) {
        const scale = eps / dist;
        state2 = state.map((v, j) => v + (state2[j] - v) * scale);
      }
    }

    const lyap = lyapCount > 0 ? lyapSum / (lyapCount * dt) : 0;
    results.push({ E_frac, lyap: Math.max(lyap, 0) });
  }

  // Draw
  const maxLyap = Math.max(...results.map(r => r.lyap), 1);

  // Grid
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = margin.t + (i / 4) * ph;
    ctx.beginPath(); ctx.moveTo(margin.l, y); ctx.lineTo(W - margin.r, y); ctx.stroke();
  }

  // Zero line
  const zeroY = margin.t + ph;
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin.l, zeroY);
  ctx.lineTo(W - margin.r, zeroY);
  ctx.stroke();

  // Plot
  ctx.strokeStyle = PURPLE;
  ctx.lineWidth = 2;
  ctx.beginPath();
  let first = true;
  for (const r of results) {
    const x = margin.l + r.E_frac * pw;
    const y = margin.t + ph - (r.lyap / maxLyap) * ph;
    if (first) { ctx.moveTo(x, y); first = false; }
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Dots
  for (const r of results) {
    const x = margin.l + r.E_frac * pw;
    const y = margin.t + ph - (r.lyap / maxLyap) * ph;
    ctx.fillStyle = r.lyap > 0.5 ? PURPLE : ORANGE;
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, TAU);
    ctx.fill();
  }

  // Axes
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin.l, margin.t);
  ctx.lineTo(margin.l, margin.t + ph);
  ctx.lineTo(margin.l + pw, margin.t + ph);
  ctx.stroke();

  ctx.fillStyle = '#555';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('Energy (fraction of max)', W / 2, H - 4);
  ctx.save();
  ctx.translate(14, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Lyapunov exponent (1/s)', 0, 0);
  ctx.restore();

  // Stats
  const transition = results.find(r => r.lyap > 0.5);
  const transE = transition ? transition.E_frac : 'N/A';
  document.getElementById('stats-lyap').textContent =
    `  Lyapunov > 0: trajectories diverge exponentially = chaos = unlocked.\n` +
    `  Lyapunov ~ 0: regular motion = locked (or quasiperiodic in a gap).\n\n` +
    `  Transition to chaos at E_frac ~ ${typeof transE === 'number' ? transE.toFixed(2) : transE}\n` +
    `  In the framework: this is the coupling K crossing the tongue boundary.\n` +
    `  The Floquet rate lambda at the boundary should equal the Lyapunov exponent.`;

  return results;
}
